<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    :root {
      --cover-focus-x: 54%;
      --cover-focus-y: 47%;
      --cover-zoom: 1.05;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .hidden { display: none !important; }

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--cover-focus-x) var(--cover-focus-y);
      transform: scale(var(--cover-zoom));
      transform-origin: var(--cover-focus-x) var(--cover-focus-y);
      display: block;
      will-change: transform;
    }

    .home-name {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #ffffff;
      font-size: 25px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: default;
    }

    #site {
      width: 100vw;
      height: 100dvh;
      background: #ffffff;
      overflow: hidden;
    }

    .topbar {
      height: 84px;
      min-height: 84px;
      padding: 34px 34px 14px;
      background: #ffffff;
      position: relative;
      z-index: 100;
    }

    .mobile-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    #brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 25px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: default;
      white-space: nowrap;
      color: #111;
      pointer-events: none;
    }

    .mobile-menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 34px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .mobile-menu-button span {
      display: block;
      width: 31px;
      height: 2px;
      background: #111;
      position: relative;
    }

    .mobile-menu-button span::before,
    .mobile-menu-button span::after {
      content: "";
      position: absolute;
      left: 0;
      width: 31px;
      height: 2px;
      background: #111;
    }

    .mobile-menu-button span::before { top: -9px; }
    .mobile-menu-button span::after { top: 9px; }

    .summary {
      width: 100vw;
      height: calc(100dvh - 84px);
      padding: 18px 0 30px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .project-grid {
      display: flex;
      width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 16px;
      padding: 0 34px 14px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .project-grid::-webkit-scrollbar { display: none; }

    .project-card {
      flex: 0 0 78vw;
      scroll-snap-align: center;
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: #111;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #f0f0f0;
    }

    .card-text {
      padding-top: 12px;
      display: block;
    }

    .card-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-type {
      display: block;
      font-size: 11px;
      line-height: 1.3;
      color: #555;
      margin-bottom: 5px;
    }

    .card-line {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      color: #222;
    }

    .viewer {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) 24px 52px;
      background: #ffffff;
      overflow: hidden;
    }

    .document-wrap {
      min-height: 0;
      width: 100vw;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .image-stage {
      position: relative;
      width: 100vw;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .page-image-layer {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      background: #ffffff;
    }

    .previous-image {
      display: none;
      z-index: 1;
    }

    .current-image {
      z-index: 2;
    }

    .image-stage.animate-next-page .previous-image {
      display: block;
      animation: outLeft 260ms ease forwards;
    }

    .image-stage.animate-next-page .current-image {
      animation: inRight 260ms ease forwards;
    }

    .image-stage.animate-prev-page .previous-image {
      display: block;
      animation: outRight 260ms ease forwards;
    }

    .image-stage.animate-prev-page .current-image {
      animation: inLeft 260ms ease forwards;
    }

    .image-stage.animate-next-project .previous-image {
      display: block;
      animation: outUp 280ms ease forwards;
    }

    .image-stage.animate-next-project .current-image {
      animation: inBottom 280ms ease forwards;
    }

    .image-stage.animate-prev-project .previous-image {
      display: block;
      animation: outDown 280ms ease forwards;
    }

    .image-stage.animate-prev-project .current-image {
      animation: inTop 280ms ease forwards;
    }

    @keyframes inRight {
      from { transform: translateX(100%); opacity: 1; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes outLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-100%); opacity: 1; }
    }

    @keyframes inLeft {
      from { transform: translateX(-100%); opacity: 1; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes outRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 1; }
    }

    @keyframes inBottom {
      from { transform: translateY(100%); opacity: 1; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes outUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-100%); opacity: 1; }
    }

    @keyframes inTop {
      from { transform: translateY(-100%); opacity: 1; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes outDown {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(100%); opacity: 1; }
    }

    .mobile-swipe-indicator {
      height: 24px;
      padding: 0 34px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 116px;
      background: #ffffff;
      transform: translateY(-16px);
      z-index: 65;
    }

    .swipe-arrow-button {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      font: inherit;
      font-size: 25px;
      line-height: 1;
      color: rgba(17, 17, 17, 0.48);
      transform: translateY(-5px);
      cursor: pointer;
      width: 34px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .swipe-arrow-button:disabled {
      opacity: 0.18;
      cursor: default;
    }

    #mobile-counter {
      font-size: 15px;
      line-height: 1;
      color: rgba(17, 17, 17, 0.62);
      white-space: nowrap;
    }

    .mobile-project-bottom {
      height: 52px;
      padding: 0 34px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 18px;
      background: #ffffff;
      z-index: 90;
      position: relative;
    }

    .mobile-index-button,
    .mobile-info-button {
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 400;
      color: rgba(17, 17, 17, 0.72);
      cursor: pointer;
      white-space: nowrap;
    }

    .mobile-index-button {
      grid-column: 1;
      justify-self: start;
      text-align: left;
    }

    .mobile-info-button {
      grid-column: 3;
      justify-self: end;
      text-align: right;
    }

    #mobile-current-title {
      grid-column: 2;
      justify-self: center;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: rgba(17, 17, 17, 0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 42vw;
      text-align: center;
      cursor: pointer;
    }

    .bottom-panel {
      display: none;
    }

    .bottom-panel.open {
      display: block;
      position: fixed;
      left: 0;
      right: 0;
      top: 84px;
      bottom: 52px;
      z-index: 80;
      background: #ffffff;
      border-top: 1px solid rgba(17, 17, 17, 0.10);
      border-bottom: 1px solid rgba(17, 17, 17, 0.10);
      padding: 34px 34px 34px;
      overflow-y: auto;
      touch-action: pan-y;
    }

    .info-title {
      margin: 0 0 24px 0;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: #111;
      text-align: left;
    }

    .info-meta {
      margin: 0 0 30px 0;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    .info-meta li {
      margin: 0 0 7px 0;
      padding: 0;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 600;
      color: #111;
      text-align: left;
      text-indent: 0;
      letter-spacing: -0.005em;
    }

    .info-section-title {
      margin: 26px 0 9px 0;
      padding: 0;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 650;
      color: #111;
      text-align: left;
      text-indent: 0;
      letter-spacing: -0.005em;
    }

    .info-section-title:first-child {
      margin-top: 0;
    }

    .info-body {
      text-align: justify;
      text-align-last: left;
      hyphens: auto;
    }

    .info-body p {
      margin: 0 0 16px 0;
      font-size: 15px;
      line-height: 1.48;
      color: #111;
      text-align: justify;
      text-align-last: left;
      text-indent: 1.6em;
      hyphens: auto;
    }

    .info-body p:last-child {
      margin-bottom: 0;
    }

    .index-list button {
      width: 100%;
      padding: 16px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      background: transparent;
      text-align: left;
      color: #111;
      cursor: pointer;
    }

    .index-number {
      display: block;
      font-size: 11px;
      line-height: 1.2;
      color: rgba(17, 17, 17, 0.45);
      margin-bottom: 4px;
    }

    .index-title {
      display: block;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 500;
      color: #111;
    }

    .index-subtitle {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      margin-top: 5px;
      color: rgba(17, 17, 17, 0.55);
    }

    .about {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
    }

    .about-wrap {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    #about-image {
      width: 100vw;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      background: #ffffff;
      pointer-events: none;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 33.333vw;
      min-width: 128px;
      max-width: 33.333vw;
      height: 100dvh;
      padding: 72px 16px 24px;
      border-left: 1px solid rgba(17, 17, 17, 0.10);
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.06);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 120;
      background: #ffffff;
      overflow-y: auto;
      touch-action: pan-y;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
    }

    .close-drawer {
      width: 34px;
      height: 34px;
      padding: 0;
      border: none;
      background: transparent;
      font-size: 28px;
      cursor: pointer;
    }

    .drawer-nav button {
      width: 100%;
      padding: 18px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      background: transparent;
      text-align: left;
      font-size: 17px;
      line-height: 1.2;
      color: #111;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      z-index: 110;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">GUILLAUME MORVAN</button>
  </section>

  <section id="site" class="hidden">
    <header class="topbar">
      <div class="mobile-header-row">
        <button id="brand">GUILLAUME MORVAN</button>
        <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Menu">
          <span></span>
        </button>
      </div>
    </header>

    <main id="summary" class="summary">
      <div id="project-grid" class="project-grid"></div>
    </main>

    <main id="about" class="about hidden">
      <div id="about-wrap" class="about-wrap">
        <img id="about-image" src="" alt="À propos — Guillaume Morvan" />
      </div>
    </main>

    <main id="viewer" class="viewer hidden">
      <div id="document-wrap" class="document-wrap">
        <div id="image-stage" class="image-stage">
          <img id="previous-image" class="page-image-layer previous-image" src="" alt="" />
          <img id="page-image" class="page-image-layer current-image" src="" alt="Portfolio Guillaume Morvan" />
        </div>
      </div>

      <div class="mobile-swipe-indicator">
        <button id="prev-page-button" class="swipe-arrow-button" aria-label="Page précédente">‹</button>
        <span id="mobile-counter">1/1</span>
        <button id="next-page-button" class="swipe-arrow-button" aria-label="Page suivante">›</button>
      </div>

      <div class="mobile-project-bottom">
        <button id="mobile-index-button" class="mobile-index-button">Index</button>
        <div id="mobile-current-title">Projet</div>
        <button id="mobile-info-button" class="mobile-info-button">Info</button>
      </div>

      <div id="mobile-info-panel" class="bottom-panel">
        <div id="mobile-info-text" class="info-text"></div>
      </div>

      <div id="mobile-index-panel" class="bottom-panel">
        <div id="mobile-index-list" class="index-list"></div>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <button id="close-drawer" class="close-drawer" aria-label="Fermer">×</button>
    </div>

    <div id="drawer-nav" class="drawer-nav">
      <button id="drawer-home">Accueil</button>
      <button id="drawer-foundation">Fondation</button>
      <button id="drawer-parcours">Parcours</button>
      <button id="drawer-contact">Contact</button>
    </div>
  </aside>

  <script>
    const ASSET_VERSION = "2026-06-26-8";

    const VIGNETTE_FOLDER = "Vignettes/";
    const SWIPE_MIN = 45;
    const DIRECTION_RATIO = 1.15;

    const ABOUT_SECTIONS = [
      { slug: "fondation", label: "Fondation", folder: "apropos-mobile/fondation/", start: 1, end: 1 },
      { slug: "parcours", label: "Parcours", folder: "apropos-mobile/parcours/", start: 1, end: 1 },
      { slug: "contact", label: "Contact", folder: "apropos-mobile/contact/", start: 1, end: 1 }
    ];

    const PROJECTS = [
      {
        slug: "melle",
        title: "Melle",
        displayTitle: "Melle",
        fullTitle: "Station ferroviaire Melle",
        type: "Projet urbain et bâtiment mixte",
        line: "Évolutivité et appropriation des espaces.",
        infoTitle: "Évolutivité et appropriation de l’espace commun",
        infoFile: "pages-mobile/melle/info.txt",
        fallbackInfo: "Le projet investit le parc ferroviaire de Ledeberg, au sud de Gand, dans un tissu pavillonnaire dense.",
        thumb: "melle.jpg",
        folder: "pages-mobile/melle/",
        filePrefix: "page",
        start: 1,
        end: 9
      },
      {
        slug: "saint-joseph",
        title: "Saint-Joseph",
        displayTitle: "Saint-Joseph",
        fullTitle: "Église Saint-Joseph",
        type: "Réhabilitation patrimoniale",
        line: "Révéler les qualités cachées du patrimoine.",
        infoTitle: "Révéler les qualités cachées du patrimoine",
        infoFile: "pages-mobile/saint-joseph/info.txt",
        fallbackInfo: "Le projet interroge la capacité d’un édifice patrimonial à accueillir de nouveaux usages sans perdre sa présence ni sa mémoire.",
        thumb: "saint-joseph.jpg",
        folder: "pages-mobile/saint-joseph/",
        filePrefix: "page",
        start: 1,
        end: 15
      },
      {
        slug: "ferme-nord",
        title: "Ferme Nord",
        displayTitle: "Ferme Nord",
        fullTitle: "Ferme Nord",
        type: "Réhabilitation et extension",
        line: "L’harmonieux contraste.",
        infoTitle: "L’harmonieux contraste",
        infoFile: "pages-mobile/ferme-nord/info.txt",
        fallbackInfo: "La Ferme Nord met en tension patrimoine agricole, extension contemporaine et paysage dunaire.",
        thumb: "ferme-nord.jpg",
        folder: "pages-mobile/ferme-nord/",
        filePrefix: "page",
        start: 1,
        end: 29
      },
      {
        slug: "tank",
        title: "TANK",
        displayTitle: "TANK",
        fullTitle: "TANK Architectes",
        type: "Expérience en agence",
        line: "L’architecte dans une pratique engagée pour la qualité.",
        infoTitle: "L’architecte engagé dans la qualité",
        infoFile: "pages-mobile/tank/info.txt",
        fallbackInfo: "L’expérience chez TANK Architectes m’a permis d’approcher une pratique collective exigeante.",
        thumb: "tank.jpg",
        folder: "pages-mobile/tank/",
        filePrefix: "page",
        start: 1,
        end: 13
      },
      {
        slug: "edwood",
        title: "Edwood",
        displayTitle: "Edwood",
        fullTitle: "Edwood",
        type: "Construction bois",
        line: "Le chantier comme école de la réalité constructive.",
        infoTitle: "Le chantier comme école de la réalité constructive",
        infoFile: "pages-mobile/edwood/info.txt",
        fallbackInfo: "Chez Edwood, l’expérience en atelier et sur chantier m’a permis d’approfondir la réalité constructive du projet.",
        thumb: "edwood.jpg",
        folder: "pages-mobile/edwood/",
        filePrefix: "page",
        start: 1,
        end: 7
      }
    ];

    let currentProject = null;
    let currentImage = null;
    let currentAboutSection = null;
    let currentAboutPage = 1;

    let gestureStartX = 0;
    let gestureStartY = 0;
    let gestureActive = false;
    let lastGestureTime = 0;
    let animationTimer = null;
    let transitionToken = 0;

    const imageCache = new Map();

    const home = document.getElementById("home");
    const site = document.getElementById("site");
    const summary = document.getElementById("summary");
    const about = document.getElementById("about");
    const viewer = document.getElementById("viewer");
    const documentWrap = document.getElementById("document-wrap");
    const imageStage = document.getElementById("image-stage");
    const previousImage = document.getElementById("previous-image");
    const pageImage = document.getElementById("page-image");
    const prevPageButton = document.getElementById("prev-page-button");
    const nextPageButton = document.getElementById("next-page-button");
    const aboutWrap = document.getElementById("about-wrap");
    const aboutImage = document.getElementById("about-image");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectGrid = document.getElementById("project-grid");
    const mobileCurrentTitle = document.getElementById("mobile-current-title");
    const mobileIndexButton = document.getElementById("mobile-index-button");
    const mobileInfoButton = document.getElementById("mobile-info-button");
    const mobileCounter = document.getElementById("mobile-counter");
    const mobileInfoPanel = document.getElementById("mobile-info-panel");
    const mobileInfoText = document.getElementById("mobile-info-text");
    const mobileIndexPanel = document.getElementById("mobile-index-panel");
    const mobileIndexList = document.getElementById("mobile-index-list");

    function getImageSrc(project, num) {
      return encodeURI(`${project.folder}${project.filePrefix} (${num}).jpg`) + `?v=${ASSET_VERSION}`;
    }

    function getAboutSrc(section, num) {
      return encodeURI(`${section.folder}page (${num}).jpg`) + `?v=${ASSET_VERSION}`;
    }

    function getVignetteSrc(filename) {
      return encodeURI(`${VIGNETTE_FOLDER}${filename}`) + `?v=${ASSET_VERSION}`;
    }

    function getInfoSrc(project) {
      if (!project.infoFile) return "";
      return encodeURI(project.infoFile) + `?v=${ASSET_VERSION}`;
    }

    function preloadImage(src) {
      if (imageCache.has(src)) return imageCache.get(src);

      const promise = new Promise(resolve => {
        const img = new Image();
        img.decoding = "async";
        img.onload = () => resolve(src);
        img.onerror = () => resolve(src);
        img.src = src;
      });

      imageCache.set(src, promise);
      return promise;
    }

    function preloadAround(project, num) {
      if (!project || !num) return;

      [num - 1, num + 1].forEach(page => {
        if (page >= project.start && page <= project.end) {
          preloadImage(getImageSrc(project, page));
        }
      });

      const projectIndex = PROJECTS.findIndex(item => item.slug === project.slug);
      const previousProject = PROJECTS[projectIndex - 1];
      const nextProject = PROJECTS[projectIndex + 1];

      if (previousProject) preloadImage(getImageSrc(previousProject, previousProject.start));
      if (nextProject) preloadImage(getImageSrc(nextProject, nextProject.start));
    }

    function preloadAboutAround(section, num) {
      if (!section || !num) return;

      [num - 1, num + 1].forEach(page => {
        if (page >= section.start && page <= section.end) {
          preloadImage(getAboutSrc(section, page));
        }
      });
    }

    function clearUrl() {
      history.replaceState({}, "", window.location.pathname);
    }

    function updateProjectUrl(num) {
      const url = new URL(window.location);
      url.searchParams.delete("about");

      if (currentProject) {
        url.searchParams.set("project", currentProject.slug);
      }

      url.searchParams.set("page", num);
      history.replaceState({}, "", url);
    }

    function updateAboutUrl(section, num) {
      const url = new URL(window.location);
      url.searchParams.delete("project");
      url.searchParams.set("about", section.slug);
      url.searchParams.set("page", num);
      history.replaceState({}, "", url);
    }

    function hideAllMainViews() {
      summary.classList.add("hidden");
      about.classList.add("hidden");
      viewer.classList.add("hidden");
      closeInfoPanel();
      closeIndexPanel();
    }

    function showSummary() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      summary.classList.remove("hidden");

      currentProject = null;
      currentImage = null;
      currentAboutSection = null;
      currentAboutPage = 1;

      closeDrawer();
      clearUrl();
    }

    function showAboutSection(slug, targetPage = 1) {
      const section = ABOUT_SECTIONS.find(item => item.slug === slug);
      if (!section) return;

      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      about.classList.remove("hidden");

      currentProject = null;
      currentImage = null;
      currentAboutSection = section;

      closeDrawer();
      goToAboutPage(targetPage);
    }

    function showViewer(project, targetPage, direction = "none") {
      currentProject = project;
      currentAboutSection = null;

      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      viewer.classList.remove("hidden");

      mobileCurrentTitle.textContent = project.displayTitle || project.title;
      loadProjectInfo(project);
      goToPage(targetPage || project.start, direction);
    }

    async function setImageWithTransition(src, direction) {
      const token = ++transitionToken;
      const currentSrc = pageImage.getAttribute("src") || "";

      imageStage.classList.remove(
        "animate-next-page",
        "animate-prev-page",
        "animate-next-project",
        "animate-prev-project"
      );

      if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = null;
      }

      if (!currentSrc || direction === "none" || currentSrc === src) {
        previousImage.style.display = "none";
        pageImage.src = src;
        preloadImage(src);
        return;
      }

      await preloadImage(src);
      if (token !== transitionToken) return;

      previousImage.src = currentSrc;
      previousImage.style.display = "block";
      pageImage.src = src;

      void imageStage.offsetWidth;
      imageStage.classList.add(direction);

      animationTimer = setTimeout(() => {
        imageStage.classList.remove(direction);
        previousImage.style.display = "none";
        previousImage.removeAttribute("src");
      }, 300);
    }

    function goToPage(num, direction = "none") {
      const target = parseInt(num, 10);

      if (!currentProject || !target) return;
      if (target < currentProject.start || target > currentProject.end) return;

      currentImage = target;
      closeInfoPanel();
      closeIndexPanel();

      const targetSrc = getImageSrc(currentProject, currentImage);
      setImageWithTransition(targetSrc, direction);
      preloadAround(currentProject, currentImage);

      updateProjectUrl(currentImage);
      updateMobileProjectUi();
    }

    function previousPage() {
      if (!currentProject || currentImage <= currentProject.start) return;
      goToPage(currentImage - 1, "animate-prev-page");
    }

    function nextPage() {
      if (!currentProject || currentImage >= currentProject.end) return;
      goToPage(currentImage + 1, "animate-next-page");
    }

    function previousProject() {
      if (!currentProject) return;

      const index = PROJECTS.findIndex(project => project.slug === currentProject.slug);
      if (index <= 0) return;

      const previous = PROJECTS[index - 1];
      showViewer(previous, previous.start, "animate-prev-project");
    }

    function nextProject() {
      if (!currentProject) return;

      const index = PROJECTS.findIndex(project => project.slug === currentProject.slug);
      if (index < 0 || index >= PROJECTS.length - 1) return;

      const next = PROJECTS[index + 1];
      showViewer(next, next.start, "animate-next-project");
    }

    function updateMobileProjectUi() {
      if (!currentProject || currentImage === null) return;

      const total = currentProject.end - currentProject.start + 1;
      const index = currentImage - currentProject.start + 1;

      mobileCounter.textContent = `${index}/${total}`;
      mobileCurrentTitle.textContent = currentProject.displayTitle || currentProject.title;

      prevPageButton.disabled = currentImage <= currentProject.start;
      nextPageButton.disabled = currentImage >= currentProject.end;
    }

    function renderInfoText(project, text) {
      const cleanText = (text || "").trim();
      const fallbackTitle = project.infoTitle || project.line || project.fullTitle || project.title;

      if (!cleanText) {
        mobileInfoText.innerHTML = `<h2 class="info-title">${escapeHtml(fallbackTitle)}</h2>`;
        return;
      }

      const lines = cleanText.replace(/\r\n/g, "\n").split("\n");
      let cursor = 0;

      function skipEmpty() {
        while (cursor < lines.length && lines[cursor].trim() === "") cursor++;
      }

      function readBlock() {
        const block = [];
        while (cursor < lines.length && lines[cursor].trim() !== "") {
          block.push(lines[cursor].trim());
          cursor++;
        }
        return block;
      }

      skipEmpty();

      let metaLines = [];
      let title = fallbackTitle;

      const firstBlock = readBlock();

      if (firstBlock.length > 1 && !firstBlock[0].startsWith("##")) {
        metaLines = firstBlock;
      } else if (firstBlock.length === 1 && !firstBlock[0].startsWith("##")) {
        title = firstBlock[0];
      } else {
        cursor = 0;
      }

      skipEmpty();

      if (metaLines.length > 0 && cursor < lines.length) {
        const possibleTitleBlock = readBlock();

        if (
          possibleTitleBlock.length === 1 &&
          !possibleTitleBlock[0].startsWith("##") &&
          possibleTitleBlock[0].length <= 120
        ) {
          title = possibleTitleBlock[0];
        } else {
          cursor -= possibleTitleBlock.length;
        }
      }

      skipEmpty();

      const contentHtml = [];
      let paragraphLines = [];

      function flushParagraph() {
        if (paragraphLines.length === 0) return;

        const paragraph = paragraphLines.join(" ").trim();

        if (paragraph) {
          contentHtml.push(`<p>${escapeHtml(paragraph)}</p>`);
        }

        paragraphLines = [];
      }

      while (cursor < lines.length) {
        const line = lines[cursor].trim();

        if (line === "") {
          flushParagraph();
          cursor++;
          continue;
        }

        if (line.startsWith("##")) {
          flushParagraph();

          const subtitle = line.replace(/^##+/, "").trim();

          if (subtitle) {
            contentHtml.push(`<h3 class="info-section-title">${escapeHtml(subtitle)}</h3>`);
          }

          cursor++;
          continue;
        }

        paragraphLines.push(line);
        cursor++;
      }

      flushParagraph();

      const metaHtml = metaLines.length
        ? `
          <ul class="info-meta">
            ${metaLines.map(line => `<li>${escapeHtml(line)}</li>`).join("")}
          </ul>
        `
        : "";

      const bodyHtml = contentHtml.length
        ? `<div class="info-body">${contentHtml.join("")}</div>`
        : "";

      mobileInfoText.innerHTML = `
        <h2 class="info-title">${escapeHtml(title)}</h2>
        ${metaHtml}
        ${bodyHtml}
      `;
    }

    async function loadProjectInfo(project) {
      renderInfoText(project, project.fallbackInfo || project.line || "");

      if (!project.infoFile) return;

      try {
        const response = await fetch(getInfoSrc(project));
        if (!response.ok) return;

        const text = await response.text();
        if (text.trim().length > 0) {
          renderInfoText(project, text);
        }
      } catch (error) {
        renderInfoText(project, project.fallbackInfo || project.line || "");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function goToAboutPage(num) {
      if (!currentAboutSection) return;

      const target = parseInt(num, 10);

      if (target < currentAboutSection.start || target > currentAboutSection.end) return;

      currentAboutPage = target;
      aboutImage.src = getAboutSrc(currentAboutSection, currentAboutPage);

      preloadImage(aboutImage.src);
      preloadAboutAround(currentAboutSection, currentAboutPage);
      updateAboutUrl(currentAboutSection, currentAboutPage);
    }

    function previousAboutPage() {
      if (!currentAboutSection) return;
      if (currentAboutPage > currentAboutSection.start) {
        goToAboutPage(currentAboutPage - 1);
      }
    }

    function nextAboutPage() {
      if (!currentAboutSection) return;
      if (currentAboutPage < currentAboutSection.end) {
        goToAboutPage(currentAboutPage + 1);
      }
    }

    function openMenuDrawer() {
      closeInfoPanel();
      closeIndexPanel();
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function toggleMenuDrawer() {
      if (drawer.classList.contains("open")) closeDrawer();
      else openMenuDrawer();
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function openInfoPanel() {
      if (viewer.classList.contains("hidden")) return;
      closeDrawer();
      closeIndexPanel();
      mobileInfoPanel.classList.add("open");
    }

    function closeInfoPanel() {
      mobileInfoPanel.classList.remove("open");
    }

    function toggleInfoPanel() {
      if (mobileInfoPanel.classList.contains("open")) closeInfoPanel();
      else openInfoPanel();
    }

    function openIndexPanel() {
      if (viewer.classList.contains("hidden")) return;
      closeDrawer();
      closeInfoPanel();
      mobileIndexPanel.classList.add("open");
    }

    function closeIndexPanel() {
      mobileIndexPanel.classList.remove("open");
    }

    function toggleIndexPanel() {
      if (mobileIndexPanel.classList.contains("open")) closeIndexPanel();
      else openIndexPanel();
    }

    function buildProjectCards() {
      projectGrid.innerHTML = "";

      PROJECTS.forEach((project, index) => {
        const button = document.createElement("button");
        button.className = "project-card";

        button.innerHTML = `
          <img class="thumb" src="${getVignetteSrc(project.thumb)}" alt="${project.fullTitle}" />
          <span class="card-text">
            <span class="card-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
            <span class="card-type">${project.type}</span>
            <span class="card-line">${project.line}</span>
          </span>
        `;

        button.addEventListener("click", () => showViewer(project, project.start, "none"));
        projectGrid.appendChild(button);
      });
    }

    function buildProjectIndex() {
      mobileIndexList.innerHTML = "";

      PROJECTS.forEach((project, index) => {
        const button = document.createElement("button");

        button.innerHTML = `
          <span class="index-number">${String(index + 1).padStart(2, "0")}</span>
          <span class="index-title">${project.displayTitle || project.title}</span>
          <span class="index-subtitle">${project.type}</span>
        `;

        button.addEventListener("click", () => {
          closeIndexPanel();
          showViewer(project, project.start, "none");
        });

        mobileIndexList.appendChild(button);
      });
    }

    function startGesture(x, y) {
      gestureStartX = x;
      gestureStartY = y;
      gestureActive = true;
    }

    function endProjectGesture(x, y) {
      if (!gestureActive) return;

      gestureActive = false;

      const now = Date.now();
      if (now - lastGestureTime < 220) return;
      lastGestureTime = now;

      const dx = x - gestureStartX;
      const dy = y - gestureStartY;

      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (absX < SWIPE_MIN && absY < SWIPE_MIN) return;

      closeInfoPanel();
      closeIndexPanel();

      if (absX > absY * DIRECTION_RATIO) {
        if (dx < 0) nextPage();
        else previousPage();
        return;
      }

      if (absY > absX * DIRECTION_RATIO) {
        if (dy < 0) nextProject();
        else previousProject();
      }
    }

    function endAboutGesture(x, y) {
      if (!gestureActive) return;

      gestureActive = false;

      const dx = x - gestureStartX;
      const dy = y - gestureStartY;

      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (absX < SWIPE_MIN) return;
      if (absX < absY * DIRECTION_RATIO) return;

      if (dx < 0) nextAboutPage();
      else previousAboutPage();
    }

    function preventGestureScroll(e) {
      e.preventDefault();
    }

    home.addEventListener("click", showSummary);

    document.getElementById("home-name").addEventListener("click", event => {
      event.stopPropagation();
    });

    document.getElementById("mobile-menu-button").addEventListener("click", toggleMenuDrawer);
    document.getElementById("close-drawer").addEventListener("click", closeDrawer);

    document.getElementById("drawer-home").addEventListener("click", showSummary);
    document.getElementById("drawer-foundation").addEventListener("click", () => showAboutSection("fondation"));
    document.getElementById("drawer-parcours").addEventListener("click", () => showAboutSection("parcours"));
    document.getElementById("drawer-contact").addEventListener("click", () => showAboutSection("contact"));

    overlay.addEventListener("click", closeDrawer);

    mobileCurrentTitle.addEventListener("click", showSummary);
    mobileIndexButton.addEventListener("click", toggleIndexPanel);
    mobileInfoButton.addEventListener("click", toggleInfoPanel);

    prevPageButton.addEventListener("click", previousPage);
    nextPageButton.addEventListener("click", nextPage);

    documentWrap.addEventListener("pointerdown", e => startGesture(e.clientX, e.clientY));
    documentWrap.addEventListener("pointerup", e => endProjectGesture(e.clientX, e.clientY));
    documentWrap.addEventListener("pointercancel", () => { gestureActive = false; });
    documentWrap.addEventListener("touchmove", preventGestureScroll, { passive: false });

    aboutWrap.addEventListener("pointerdown", e => startGesture(e.clientX, e.clientY));
    aboutWrap.addEventListener("pointerup", e => endAboutGesture(e.clientX, e.clientY));
    aboutWrap.addEventListener("pointercancel", () => { gestureActive = false; });
    aboutWrap.addEventListener("touchmove", preventGestureScroll, { passive: false });

    buildProjectCards();
    buildProjectIndex();

    const params = new URLSearchParams(window.location.search);
    const directPage = parseInt(params.get("page"), 10);
    const directProjectSlug = params.get("project");
    const directAboutSlug = params.get("about");

    let directProject = null;

    if (directAboutSlug) {
      showAboutSection(directAboutSlug, directPage || 1);
    } else {
      if (directProjectSlug) {
        directProject = PROJECTS.find(project => project.slug === directProjectSlug);
      }

      if (!directProject && directPage) {
        directProject = PROJECTS[0];
      }

      if (directProject) {
        showViewer(directProject, directPage || directProject.start, "none");
      }
    }
  </script>
</body>
