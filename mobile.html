<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .home-name {
      position: absolute;
      top: 22px;
      left: 20px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #ffffff;
      font-size: 25px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
    }

    #site {
      width: 100vw;
      height: 100dvh;
      background: #ffffff;
      overflow: hidden;
    }

    .topbar {
      height: 84px;
      min-height: 84px;
      padding: 34px 34px 14px;
      display: block;
      border-bottom: none;
      background: #ffffff;
      position: relative;
      z-index: 30;
    }

    .mobile-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    #brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 25px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      color: #111;
    }

    .mobile-menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 34px;
      border: none;
      background: transparent;
      padding: 0;
      color: #111;
      cursor: pointer;
    }

    .mobile-menu-button span {
      display: block;
      width: 31px;
      height: 2px;
      background: #111;
      position: relative;
    }

    .mobile-menu-button span::before,
    .mobile-menu-button span::after {
      content: "";
      position: absolute;
      left: 0;
      width: 31px;
      height: 2px;
      background: #111;
    }

    .mobile-menu-button span::before { top: -9px; }
    .mobile-menu-button span::after { top: 9px; }

    .summary {
      width: 100vw;
      height: calc(100dvh - 84px);
      padding: 18px 0 30px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .project-grid {
      display: flex;
      width: 100vw;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 16px;
      padding: 0 34px 14px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .project-grid::-webkit-scrollbar { display: none; }

    .project-card {
      flex: 0 0 78vw;
      scroll-snap-align: center;
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: #111;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #f0f0f0;
    }

    .card-text {
      padding-top: 12px;
      display: block;
    }

    .card-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-type {
      display: block;
      font-size: 11px;
      line-height: 1.3;
      color: #555;
      margin-bottom: 5px;
    }

    .card-line {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      color: #222;
    }

    .viewer {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: block;
      position: relative;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
    }

    .document-wrap {
      width: 100vw;
      height: calc(100dvh - 84px - 52px);
      padding: 0 4px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
      touch-action: none;
    }

    #page-image {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
    }

    .mobile-project-bottom {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 52px;
      padding: 0 34px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 18px;
      background: #ffffff;
      z-index: 60;
    }

    #mobile-current-title {
      grid-column: 1;
      justify-self: start;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: rgba(17, 17, 17, 0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    #mobile-counter {
      grid-column: 2;
      justify-self: center;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 400;
      color: rgba(17, 17, 17, 0.72);
      white-space: nowrap;
    }

    .mobile-info-button {
      grid-column: 3;
      justify-self: end;
      width: 44px;
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 400;
      color: rgba(17, 17, 17, 0.72);
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
    }

    .mobile-info-panel {
      display: none;
    }

    .mobile-info-panel.open {
      display: block;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 52px;
      z-index: 80;
      background: #ffffff;
      border-top: 1px solid rgba(17, 17, 17, 0.10);
      border-bottom: 1px solid rgba(17, 17, 17, 0.10);
      padding: 26px 34px 30px;
      max-height: 58dvh;
      overflow-y: auto;
    }

    .mobile-info-panel p {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: #111;
    }

    .about {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
    }

    .about-wrap {
      width: 100vw;
      height: calc(100dvh - 84px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #about-image {
      width: 100vw;
      height: 100%;
      max-width: 100vw;
      max-height: none;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      background: #ffffff;
      touch-action: pan-x;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 33.333vw;
      min-width: 128px;
      max-width: 33.333vw;
      height: 100dvh;
      padding: 72px 16px 24px;
      border-left: 1px solid rgba(17, 17, 17, 0.10);
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.06);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 90;
      background: #ffffff;
      overflow-y: auto;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
    }

    .close-drawer {
      width: 34px;
      height: 34px;
      padding: 0;
      border: none;
      background: transparent;
      font-size: 28px;
      opacity: 1;
      cursor: pointer;
    }

    .drawer-nav {
      display: block;
    }

    .drawer-nav button {
      width: 100%;
      padding: 18px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      background: transparent;
      text-align: left;
      font-size: 17px;
      line-height: 1.2;
      color: #111;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 45;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">GUILLAUME MORVAN</button>
  </section>

  <section id="site" class="hidden">
    <header class="topbar">
      <div class="mobile-header-row">
        <button id="brand">GUILLAUME MORVAN</button>
        <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Menu">
          <span></span>
        </button>
      </div>
    </header>

    <main id="summary" class="summary">
      <div id="project-grid" class="project-grid"></div>
    </main>

    <main id="about" class="about hidden">
      <div class="about-wrap">
        <img id="about-image" src="" alt="À propos — Guillaume Morvan" />
      </div>
    </main>

    <main id="viewer" class="viewer hidden">
      <div id="document-wrap" class="document-wrap">
        <img id="page-image" src="" alt="Portfolio Guillaume Morvan" />
      </div>

      <div class="mobile-project-bottom">
        <div id="mobile-current-title">Projet</div>
        <div id="mobile-counter">1/1</div>
        <button id="mobile-info-button" class="mobile-info-button">Info</button>
      </div>

      <div id="mobile-info-panel" class="mobile-info-panel">
        <p id="mobile-info-text"></p>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <button id="close-drawer" class="close-drawer" aria-label="Fermer">×</button>
    </div>

    <div class="drawer-nav">
      <button id="drawer-home">Accueil</button>
      <button id="drawer-about">À propos</button>
    </div>
  </aside>

  <script>
    const ASSET_VERSION = "2026-06-23-12";

    const VIGNETTE_FOLDER = "Vignettes/";
    const ABOUT_FOLDER = "apropos-mobile/";
    const ABOUT_TOTAL = 4;

    const PROJECTS = [
      {
        slug: "melle",
        title: "Melle",
        displayTitle: "Melle",
        fullTitle: "Station ferroviaire Melle",
        type: "Projet urbain et bâtiment mixte",
        line: "Évolutivité et appropriation des espaces.",
        projectInfo: "Le projet investit le parc ferroviaire de Ledeberg, au sud de Gand, dans un tissu pavillonnaire dense. Il propose un bâtiment mixte associant logements, commerces et espaces communs, conçu autour des notions d’évolutivité et d’appropriation. La flexibilité repose sur une trame de 4 × 4 m et une structure poteaux-poutres en bois, permettant aux logements d’évoluer dans le temps. Les espaces traversants, la rue intérieure couverte, les programmes partagés et les matériaux naturels — bois de peuplier, terre crue, sol en terre coulée — cherchent à créer un climat propice aux usages, aux rencontres et à la présence du végétal.",
        thumb: "melle.jpg",
        folder: "pages-mobile/melle/",
        filePrefix: "melle",
        start: 1,
        end: 9
      },
      {
        slug: "saint-joseph",
        title: "Saint-Joseph",
        displayTitle: "Saint-Joseph",
        fullTitle: "Église Saint-Joseph",
        type: "Réhabilitation patrimoniale",
        line: "Révéler les qualités cachées du patrimoine.",
        projectInfo: "Le projet interroge la capacité d’un édifice patrimonial à accueillir de nouveaux usages sans perdre sa présence ni sa mémoire.",
        thumb: "saint-joseph.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 9,
        end: 17
      },
      {
        slug: "ferme-nord",
        title: "Ferme Nord",
        displayTitle: "Ferme Nord",
        fullTitle: "Ferme Nord",
        type: "Réhabilitation et extension",
        line: "L’harmonieux contraste.",
        projectInfo: "La Ferme Nord met en tension patrimoine agricole, extension contemporaine et paysage dunaire.",
        thumb: "ferme-nord.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 18,
        end: 33
      },
      {
        slug: "tank",
        title: "TANK",
        displayTitle: "TANK",
        fullTitle: "TANK Architectes",
        type: "Expérience en agence",
        line: "L’architecte dans une pratique engagée pour la qualité.",
        projectInfo: "L’expérience chez TANK Architectes m’a permis d’approcher une pratique collective exigeante.",
        thumb: "tank.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 34,
        end: 39
      },
      {
        slug: "edwood",
        title: "Edwood",
        displayTitle: "Edwood",
        fullTitle: "Edwood",
        type: "Construction bois",
        line: "Le chantier comme école de la réalité constructive.",
        projectInfo: "Chez Edwood, l’expérience en atelier et sur chantier m’a permis d’approfondir la réalité constructive du projet.",
        thumb: "edwood.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 40,
        end: 43
      }
    ];

    let currentProject = null;
    let currentImage = null;
    let currentAboutPage = 1;

    let touchStartX = 0;
    let touchStartY = 0;

    const home = document.getElementById("home");
    const site = document.getElementById("site");
    const summary = document.getElementById("summary");
    const about = document.getElementById("about");
    const viewer = document.getElementById("viewer");
    const documentWrap = document.getElementById("document-wrap");
    const pageImage = document.getElementById("page-image");
    const aboutImage = document.getElementById("about-image");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectGrid = document.getElementById("project-grid");
    const mobileCurrentTitle = document.getElementById("mobile-current-title");
    const mobileInfoButton = document.getElementById("mobile-info-button");
    const mobileCounter = document.getElementById("mobile-counter");
    const mobileInfoPanel = document.getElementById("mobile-info-panel");
    const mobileInfoText = document.getElementById("mobile-info-text");

    function getImageSrc(project, num) {
      return encodeURI(`${project.folder}${project.filePrefix} (${num}).jpg`) + `?v=${ASSET_VERSION}`;
    }

    function getAboutSrc(num) {
      return encodeURI(`${ABOUT_FOLDER}page (${num}).jpg`) + `?v=${ASSET_VERSION}`;
    }

    function getVignetteSrc(filename) {
      return encodeURI(`${VIGNETTE_FOLDER}${filename}`) + `?v=${ASSET_VERSION}`;
    }

    function clearUrl() {
      history.replaceState({}, "", window.location.pathname);
    }

    function updateUrl(num) {
      const url = new URL(window.location);
      if (currentProject) url.searchParams.set("project", currentProject.slug);
      url.searchParams.set("page", num);
      history.replaceState({}, "", url);
    }

    function hideAllMainViews() {
      summary.classList.add("hidden");
      about.classList.add("hidden");
      viewer.classList.add("hidden");
      closeInfoPanel();
    }

    function showSummary() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      summary.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeDrawer();
      clearUrl();
    }

    function showAbout() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      about.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeDrawer();
      clearUrl();
      goToAboutPage(1);
    }

    function showViewer(project, targetPage) {
      currentProject = project;
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      viewer.classList.remove("hidden");
      mobileCurrentTitle.textContent = project.displayTitle || project.title;
      goToPage(targetPage || project.start);
    }

    function goToPage(num) {
      const target = parseInt(num, 10);
      if (!currentProject || !target) return;
      if (target < currentProject.start || target > currentProject.end) return;

      currentImage = target;
      closeInfoPanel();
      pageImage.src = getImageSrc(currentProject, currentImage);
      updateUrl(currentImage);
      updateMobileProjectUi();
    }

    function previousPage() {
      if (!currentProject || currentImage <= currentProject.start) return;
      goToPage(currentImage - 1);
    }

    function nextPage() {
      if (!currentProject || currentImage >= currentProject.end) return;
      goToPage(currentImage + 1);
    }

    function previousProject() {
      if (!currentProject) return;

      const index = PROJECTS.findIndex(project => project.slug === currentProject.slug);
      if (index <= 0) return;

      const previous = PROJECTS[index - 1];
      showViewer(previous, previous.start);
    }

    function nextProject() {
      if (!currentProject) return;

      const index = PROJECTS.findIndex(project => project.slug === currentProject.slug);
      if (index < 0 || index >= PROJECTS.length - 1) return;

      const next = PROJECTS[index + 1];
      showViewer(next, next.start);
    }

    function updateMobileProjectUi() {
      if (!currentProject || currentImage === null) return;
      const total = currentProject.end - currentProject.start + 1;
      const index = currentImage - currentProject.start + 1;
      mobileCounter.textContent = `${index}/${total}`;
      mobileInfoText.textContent = currentProject.projectInfo || currentProject.line || "";
    }

    function goToAboutPage(num) {
      if (num < 1 || num > ABOUT_TOTAL) return;
      currentAboutPage = num;
      aboutImage.src = getAboutSrc(currentAboutPage);
    }

    function previousAboutPage() {
      if (currentAboutPage > 1) goToAboutPage(currentAboutPage - 1);
    }

    function nextAboutPage() {
      if (currentAboutPage < ABOUT_TOTAL) goToAboutPage(currentAboutPage + 1);
    }

    function openDrawer() {
      closeInfoPanel();
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function openInfoPanel() {
      if (viewer.classList.contains("hidden")) return;
      closeDrawer();
      mobileInfoPanel.classList.add("open");
    }

    function closeInfoPanel() {
      mobileInfoPanel.classList.remove("open");
    }

    function toggleInfoPanel() {
      if (mobileInfoPanel.classList.contains("open")) closeInfoPanel();
      else openInfoPanel();
    }

    function buildProjectCards() {
      projectGrid.innerHTML = "";

      PROJECTS.forEach((project, index) => {
        const button = document.createElement("button");
        button.className = "project-card";
        button.innerHTML = `
          <img class="thumb" src="${getVignetteSrc(project.thumb)}" alt="${project.fullTitle}" />
          <span class="card-text">
            <span class="card-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
            <span class="card-type">${project.type}</span>
            <span class="card-line">${project.line}</span>
          </span>
        `;
        button.addEventListener("click", () => showViewer(project, project.start));
        projectGrid.appendChild(button);
      });
    }

    function handleTouchStart(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }

    function handleProjectTouchEnd(e) {
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;

      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;

      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (absX < 45 && absY < 45) return;

      closeInfoPanel();

      if (absX > absY) {
        if (dx < 0) nextPage();
        else previousPage();
        return;
      }

      if (absY > absX) {
        if (dy < 0) nextProject();
        else previousProject();
      }
    }

    function handleAboutTouchEnd(e) {
      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;

      if (Math.abs(dx) < 45) return;
      if (Math.abs(dx) < Math.abs(dy)) return;

      if (dx < 0) nextAboutPage();
      else previousAboutPage();
    }

    home.addEventListener("click", showSummary);
    document.getElementById("home-name").addEventListener("click", showSummary);
    document.getElementById("brand").addEventListener("click", showSummary);
    document.getElementById("mobile-menu-button").addEventListener("click", openDrawer);
    document.getElementById("close-drawer").addEventListener("click", closeDrawer);
    document.getElementById("drawer-home").addEventListener("click", showSummary);
    document.getElementById("drawer-about").addEventListener("click", showAbout);

    overlay.addEventListener("click", () => {
      closeDrawer();
      closeInfoPanel();
    });

    mobileInfoButton.addEventListener("click", toggleInfoPanel);

    documentWrap.addEventListener("touchstart", handleTouchStart, { passive: true });
    documentWrap.addEventListener("touchend", handleProjectTouchEnd, { passive: true });

    aboutImage.addEventListener("touchstart", handleTouchStart, { passive: true });
    aboutImage.addEventListener("touchend", handleAboutTouchEnd, { passive: true });

    buildProjectCards();

    const params = new URLSearchParams(window.location.search);
    const directPage = parseInt(params.get("page"), 10);
    const directProjectSlug = params.get("project");

    let directProject = null;

    if (directProjectSlug) {
      directProject = PROJECTS.find(project => project.slug === directProjectSlug);
    }

    if (!directProject) {
      directProject = PROJECTS.find(project => directPage >= project.start && directPage <= project.end);
    }

    if (directProject) showViewer(directProject, directPage);
  </script>
</body>
</html>
