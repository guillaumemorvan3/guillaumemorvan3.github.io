<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .home-name {
      position: absolute;
      top: 34px;
      left: 40px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #ffffff;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
    }

    #site {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      overflow: hidden;
    }

    .topbar {
      height: 44px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(17, 17, 17, 0.08);
      background: #ffffff;
      position: relative;
      z-index: 30;
    }

    #brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 21px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      color: #111;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      white-space: nowrap;
    }

    .topbar button {
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      color: #111;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar button:hover,
    .project-card:hover,
    .project-item:hover {
      opacity: 0.65;
    }

    .summary {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 54px 36px 40px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .project-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .project-card {
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: #111;
      min-width: 0;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #f0f0f0;
    }

    .card-text {
      padding-top: 12px;
      display: block;
    }

    .card-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-type {
      display: block;
      font-size: 11px;
      line-height: 1.3;
      color: #555;
      margin-bottom: 5px;
    }

    .card-line {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      color: #222;
    }

    .about,
    .viewer {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
    }

    .about-wrap,
    .document-wrap {
      position: relative;
      width: 100vw;
      height: calc(100vh - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #about-image,
    #page-image {
      max-width: 100vw;
      max-height: calc(100vh - 44px);
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      background: #ffffff;
      touch-action: pan-y;
    }

    .portfolio-download-zone {
      position: absolute;
      z-index: 25;
      display: block;
      background: transparent;
      cursor: pointer;
    }

    .portfolio-download-zone:hover {
      outline: 1px solid rgba(17, 17, 17, 0.18);
      outline-offset: 2px;
    }

    .nav-side {
      position: fixed;
      top: calc(44px + (100vh - 44px) / 2);
      transform: translateY(-50%);
      width: 44px;
      height: 72px;
      padding: 0;
      border: none;
      background: transparent;
      color: #111;
      font-size: 34px;
      line-height: 1;
      opacity: 0.16;
      z-index: 10;
      cursor: pointer;
    }

    .nav-side:hover { opacity: 0.75; }
    .nav-side:disabled { opacity: 0.04; cursor: default; }

    .nav-prev { left: 8px; }
    .nav-next { right: 8px; }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      max-width: 92vw;
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid rgba(17, 17, 17, 0.14);
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 50;
      padding: 28px;
      overflow-y: auto;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .close-drawer {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      font-size: 22px;
      opacity: 0.55;
      cursor: pointer;
    }

    .project-item {
      width: 100%;
      padding: 16px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      text-align: left;
      background: transparent;
      color: #111;
      cursor: pointer;
    }

    .project-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .project-subtitle {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      color: #555;
    }

    .project-page {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #777;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 17, 17, 0.06);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 45;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">GUILLAUME MORVAN</button>
  </section>

  <section id="site" class="hidden">
    <header class="topbar">
      <button id="brand">GUILLAUME MORVAN</button>

      <div class="topbar-right">
        <button id="projects-btn">Projets</button>
        <button id="about-btn">À propos</button>
      </div>
    </header>

    <main id="summary" class="summary">
      <div id="project-grid" class="project-grid"></div>
    </main>

    <main id="about" class="about hidden">
      <div class="about-wrap" id="about-wrap">
        <button id="about-prev" class="nav-side nav-prev">‹</button>
        <img id="about-image" src="" alt="À propos — Guillaume Morvan" />
        <button id="about-next" class="nav-side nav-next">›</button>

        <a
          id="portfolio-download-zone"
          class="portfolio-download-zone hidden"
          href="https://drive.google.com/uc?export=download&id=1RKjeYMM-iudjpduVnrbGJ2ElCqVxp70R"
          target="_blank"
          rel="noopener"
          aria-label="Télécharger le portfolio PDF"
        ></a>
      </div>
    </main>

    <main id="viewer" class="viewer hidden">
      <div class="document-wrap">
        <button id="prev-side" class="nav-side nav-prev">‹</button>
        <img id="page-image" src="" alt="Portfolio Guillaume Morvan" />
        <button id="next-side" class="nav-side nav-next">›</button>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h2>Projets</h2>
      <button id="close-drawer" class="close-drawer">×</button>
    </div>
    <div id="project-list"></div>
  </aside>

  <script>
    const VIGNETTE_FOLDER = "Vignettes/";
    const ABOUT_FOLDER = "apropos/";
    const ABOUT_TOTAL = 2;

    const DOWNLOAD_PAGE = 2;

    const DOWNLOAD_ZONE = {
      x: 0.63,
      y: 0.68,
      w: 0.22,
      h: 0.08
    };

    const PROJECTS = [
      {
        slug: "melle",
        title: "Melle",
        fullTitle: "Station ferroviaire Melle",
        type: "Projet urbain et bâtiment mixte",
        line: "Évolutivité et appropriation des espaces.",
        thumb: "melle.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 4,
        end: 8
      },
      {
        slug: "saint-joseph",
        title: "Saint-Joseph",
        fullTitle: "Église Saint-Joseph",
        type: "Réhabilitation patrimoniale",
        line: "Révéler les qualités cachées du patrimoine.",
        thumb: "saint-joseph.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 9,
        end: 17
      },
      {
        slug: "ferme-nord",
        title: "Ferme Nord",
        fullTitle: "Ferme Nord",
        type: "Réhabilitation et extension",
        line: "L’harmonieux contraste.",
        thumb: "ferme-nord.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 18,
        end: 33
      },
      {
        slug: "tank",
        title: "TANK",
        fullTitle: "TANK Architectes",
        type: "Expérience en agence",
        line: "L’architecte dans une pratique engagée pour la qualité.",
        thumb: "tank.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 34,
        end: 39
      },
      {
        slug: "edwood",
        title: "Edwood",
        fullTitle: "Edwood",
        type: "Construction bois",
        line: "Le chantier comme école de la réalité constructive.",
        thumb: "edwood.jpg",
        folder: "pages/",
        filePrefix: "page",
        start: 40,
        end: 43
      }
    ];

    let currentProject = null;
    let currentImage = null;
    let currentAboutPage = 1;
    let lastWheelTime = 0;
    let touchStartX = 0;
    let touchStartY = 0;

    const home = document.getElementById("home");
    const site = document.getElementById("site");
    const summary = document.getElementById("summary");
    const about = document.getElementById("about");
    const viewer = document.getElementById("viewer");
    const pageImage = document.getElementById("page-image");
    const aboutImage = document.getElementById("about-image");
    const aboutWrap = document.getElementById("about-wrap");
    const downloadZone = document.getElementById("portfolio-download-zone");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectGrid = document.getElementById("project-grid");
    const projectList = document.getElementById("project-list");

    function getImageSrc(project, num) {
      return encodeURI(`${project.folder}${project.filePrefix} (${num}).jpg`);
    }

    function getAboutSrc(num) {
      return encodeURI(`${ABOUT_FOLDER}page (${num}).jpg`);
    }

    function getVignetteSrc(filename) {
      return encodeURI(`${VIGNETTE_FOLDER}${filename}`);
    }

    function clearUrl() {
      history.replaceState({}, "", window.location.pathname);
    }

    function updateUrl(num) {
      const url = new URL(window.location);
      if (currentProject) url.searchParams.set("project", currentProject.slug);
      url.searchParams.set("page", num);
      history.replaceState({}, "", url);
    }

    function hideAllMainViews() {
      summary.classList.add("hidden");
      about.classList.add("hidden");
      viewer.classList.add("hidden");
      hideDownloadZone();
    }

    function showSummary() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      summary.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeDrawer();
      clearUrl();
    }

    function showAbout() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      about.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeDrawer();
      clearUrl();
      goToAboutPage(1);
    }

    function showViewer(project, targetPage) {
      currentProject = project;
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      viewer.classList.remove("hidden");
      goToPage(targetPage || project.start, false);
    }

    function goToPage(num, close = true) {
      const target = parseInt(num, 10);
      if (!currentProject || !target) return;
      if (target < currentProject.start || target > currentProject.end) return;

      currentImage = target;
      pageImage.src = getImageSrc(currentProject, currentImage);
      updateUrl(currentImage);
      updateNavState();

      if (close) closeDrawer();
    }

    function previousPage() {
      if (!currentProject || currentImage <= currentProject.start) return;
      goToPage(currentImage - 1, false);
    }

    function nextPage() {
      if (!currentProject || currentImage >= currentProject.end) return;
      goToPage(currentImage + 1, false);
    }

    function goToAboutPage(num) {
      if (num < 1 || num > ABOUT_TOTAL) return;
      currentAboutPage = num;
      aboutImage.src = getAboutSrc(currentAboutPage);
      updateAboutNavState();
      updateDownloadZone();
    }

    function previousAboutPage() {
      if (currentAboutPage > 1) goToAboutPage(currentAboutPage - 1);
    }

    function nextAboutPage() {
      if (currentAboutPage < ABOUT_TOTAL) goToAboutPage(currentAboutPage + 1);
    }

    function updateNavState() {
      document.getElementById("prev-side").disabled = !currentProject || currentImage <= currentProject.start;
      document.getElementById("next-side").disabled = !currentProject || currentImage >= currentProject.end;
    }

    function updateAboutNavState() {
      document.getElementById("about-prev").disabled = currentAboutPage <= 1;
      document.getElementById("about-next").disabled = currentAboutPage >= ABOUT_TOTAL;
    }

    function hideDownloadZone() {
      downloadZone.classList.add("hidden");
    }

    function updateDownloadZone() {
      if (about.classList.contains("hidden") || currentAboutPage !== DOWNLOAD_PAGE) {
        hideDownloadZone();
        return;
      }

      downloadZone.classList.remove("hidden");
      positionDownloadZone();
    }

    function positionDownloadZone() {
      if (downloadZone.classList.contains("hidden")) return;

      const imageRect = aboutImage.getBoundingClientRect();
      const wrapRect = aboutWrap.getBoundingClientRect();

      const left = imageRect.left - wrapRect.left + imageRect.width * DOWNLOAD_ZONE.x;
      const top = imageRect.top - wrapRect.top + imageRect.height * DOWNLOAD_ZONE.y;
      const width = imageRect.width * DOWNLOAD_ZONE.w;
      const height = imageRect.height * DOWNLOAD_ZONE.h;

      downloadZone.style.left = `${left}px`;
      downloadZone.style.top = `${top}px`;
      downloadZone.style.width = `${width}px`;
      downloadZone.style.height = `${height}px`;
    }

    function openDrawer() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function buildProjectCards() {
      projectGrid.innerHTML = "";
      PROJECTS.forEach((project, index) => {
        const button = document.createElement("button");
        button.className = "project-card";
        button.innerHTML = `
          <img class="thumb" src="${getVignetteSrc(project.thumb)}" alt="${project.fullTitle}" />
          <span class="card-text">
            <span class="card-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
            <span class="card-type">${project.type}</span>
            <span class="card-line">${project.line}</span>
          </span>
        `;
        button.addEventListener("click", () => showViewer(project, project.start));
        projectGrid.appendChild(button);
      });
    }

    function buildProjectList() {
      projectList.innerHTML = "";
      PROJECTS.forEach((project, index) => {
        const button = document.createElement("button");
        button.className = "project-item";
        button.innerHTML = `
          <span class="project-title">${String(index + 1).padStart(2, "0")} — ${project.fullTitle}</span>
          <span class="project-subtitle">${project.line}</span>
          <span class="project-page">Pages ${project.start} à ${project.end}</span>
        `;
        button.addEventListener("click", () => showViewer(project, project.start));
        projectList.appendChild(button);
      });
    }

    function handleWheel(e, previousFunction, nextFunction) {
      e.preventDefault();
      const now = Date.now();
      if (now - lastWheelTime < 420) return;
      if (Math.abs(e.deltaY) < 20) return;
      if (e.deltaY > 0) nextFunction();
      else previousFunction();
      lastWheelTime = now;
    }

    function handleTouchStart(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }

    function handleProjectTouchEnd(e) {
      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy)) return;
      if (dx < 0) nextPage();
      else previousPage();
    }

    function handleAboutTouchEnd(e) {
      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy)) return;
      if (dx < 0) nextAboutPage();
      else previousAboutPage();
    }

    home.addEventListener("click", showSummary);
    document.getElementById("home-name").addEventListener("click", showSummary);
    document.getElementById("brand").addEventListener("click", showSummary);
    document.getElementById("about-btn").addEventListener("click", showAbout);

    document.getElementById("projects-btn").addEventListener("click", () => {
      if (!viewer.classList.contains("hidden")) openDrawer();
      else showSummary();
    });

    document.getElementById("close-drawer").addEventListener("click", closeDrawer);
    overlay.addEventListener("click", closeDrawer);

    document.getElementById("prev-side").addEventListener("click", previousPage);
    document.getElementById("next-side").addEventListener("click", nextPage);
    document.getElementById("about-prev").addEventListener("click", previousAboutPage);
    document.getElementById("about-next").addEventListener("click", nextAboutPage);

    pageImage.addEventListener("wheel", e => handleWheel(e, previousPage, nextPage), { passive: false });
    aboutImage.addEventListener("wheel", e => handleWheel(e, previousAboutPage, nextAboutPage), { passive: false });

    pageImage.addEventListener("touchstart", handleTouchStart, { passive: true });
    pageImage.addEventListener("touchend", handleProjectTouchEnd, { passive: true });

    aboutImage.addEventListener("touchstart", handleTouchStart, { passive: true });
    aboutImage.addEventListener("touchend", handleAboutTouchEnd, { passive: true });

    aboutImage.addEventListener("load", positionDownloadZone);
    window.addEventListener("resize", positionDownloadZone);

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawer();

      if (e.key === "ArrowLeft") {
        if (!viewer.classList.contains("hidden")) previousPage();
        if (!about.classList.contains("hidden")) previousAboutPage();
      }

      if (e.key === "ArrowRight") {
        if (!viewer.classList.contains("hidden")) nextPage();
        if (!about.classList.contains("hidden")) nextAboutPage();
      }
    });

    buildProjectCards();
    buildProjectList();

    const params = new URLSearchParams(window.location.search);
    const directPage = parseInt(params.get("page"), 10);
    const directProjectSlug = params.get("project");

    let directProject = null;

    if (directProjectSlug) {
      directProject = PROJECTS.find(project => project.slug === directProjectSlug);
    }

    if (!directProject) {
      directProject = PROJECTS.find(project => directPage >= project.start && directPage <= project.end);
    }

    if (directProject) showViewer(directProject, directPage);
  </script>
</body>
</html>
