<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #111;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* ACCUEIL */

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .home-name {
      position: absolute;
      top: 34px;
      left: 40px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #f5f3ee;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: -0.03em;
      cursor: pointer;
    }

    .home-name:hover {
      opacity: 0.55;
    }

    /* VIEWER */

    #app {
      width: 100vw;
      height: 100vh;
      background: #f5f3ee;
      overflow: hidden;
    }

    .topbar {
      height: 44px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      background: #f5f3ee;
    }

    .brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.03em;
      cursor: pointer;
      white-space: nowrap;
      color: #111;
    }

    .brand:hover {
      opacity: 0.55;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      white-space: nowrap;
    }

    .topbar button,
    .topbar a {
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-size: 12px;
      color: #111;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar button:hover,
    .topbar a:hover {
      opacity: 0.55;
    }

    .viewer {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f5f3ee;
    }

    .document-wrap {
      position: relative;
      width: 100vw;
      height: calc(100vh - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #page-image {
      max-width: 100vw;
      max-height: calc(100vh - 44px);
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.12s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    #page-image.loading {
      opacity: 0.35;
    }

    .nav-side {
      position: fixed;
      top: calc(44px + (100vh - 44px) / 2);
      transform: translateY(-50%);
      width: 44px;
      height: 72px;
      padding: 0;
      border: none;
      background: transparent;
      color: #111;
      font-size: 34px;
      line-height: 1;
      opacity: 0.16;
      z-index: 10;
      cursor: pointer;
    }

    .nav-side:hover {
      opacity: 0.75;
    }

    #prev-side {
      left: 8px;
    }

    #next-side {
      right: 8px;
    }

    /* MENU PROJETS */

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      max-width: 92vw;
      height: 100vh;
      background: #f5f3ee;
      border-left: 1px solid rgba(17, 17, 17, 0.18);
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      padding: 28px;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .close-drawer {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      font-size: 22px;
      opacity: 0.55;
      cursor: pointer;
    }

    .close-drawer:hover {
      opacity: 1;
    }

    .project-item {
      width: 100%;
      padding: 16px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.16);
      text-align: left;
      background: transparent;
      color: #111;
      cursor: pointer;
    }

    .project-item:hover {
      opacity: 0.55;
    }

    .project-title {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .project-subtitle {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      color: #555;
    }

    .project-page {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #777;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 17, 17, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 15;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 850px) {
      .home-name {
        top: 24px;
        left: 22px;
        font-size: 24px;
      }

      .topbar {
        height: auto;
        min-height: 70px;
        padding: 12px 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .topbar-right {
        justify-content: flex-start;
        gap: 18px;
      }

      .viewer,
      .document-wrap {
        height: calc(100vh - 90px);
      }

      #page-image {
        max-height: calc(100vh - 90px);
      }

      .nav-side {
        top: calc(90px + (100vh - 90px) / 2);
        opacity: 0.28;
      }

      #prev-side {
        left: 4px;
      }

      #next-side {
        right: 4px;
      }
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">Guillaume Morvan</button>
  </section>

  <section id="app" class="hidden">
    <header class="topbar">
      <button id="brand" class="brand">Guillaume Morvan</button>

      <div class="topbar-right">
        <button id="projects-btn">Projets</button>
        <a href="portfolio-guillaume-morvan.pdf" download>Télécharger le PDF</a>
      </div>
    </header>

    <main class="viewer">
      <div class="document-wrap">
        <button id="prev-side" class="nav-side" aria-label="Page précédente">‹</button>
        <img id="page-image" src="" alt="Portfolio Guillaume Morvan" />
        <button id="next-side" class="nav-side" aria-label="Page suivante">›</button>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h2>Projets</h2>
      <button id="close-drawer" class="close-drawer" aria-label="Fermer">×</button>
    </div>

    <div id="project-list"></div>
  </aside>

  <script>
    const IMAGE_PREFIX = "Morvan_Guillaume_Portfolio_2018_2026_réduit";
    const IMAGE_EXTENSION = ".jpg";

    const FIRST_IMAGE = 2;
    const LAST_IMAGE = 46;
    const START_IMAGE = 2;

    const PROJECTS = [
      {
        title: "Fondations",
        subtitle: "Entre technologies contemporaines et bon sens vernaculaire",
        page: 2
      },
      {
        title: "Station ferroviaire Melle",
        subtitle: "Évolutivité et appropriation des espaces",
        page: 4
      },
      {
        title: "Église Saint-Joseph",
        subtitle: "Réhabilitation du patrimoine : révéler les qualités cachées",
        page: 10
      },
      {
        title: "Ferme Nord",
        subtitle: "Réhabilitation du patrimoine : l’harmonieux contraste",
        page: 20
      },
      {
        title: "TANK",
        subtitle: "L’architecte dans une pratique engagée pour la qualité",
        page: 34
      },
      {
        title: "EDWOOD",
        subtitle: "Le chantier bois : école de la réalité constructive",
        page: 40
      }
    ];

    let currentImage = START_IMAGE;
    let lastWheelTime = 0;

    const home = document.getElementById("home");
    const app = document.getElementById("app");
    const pageImage = document.getElementById("page-image");

    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectList = document.getElementById("project-list");

    function getImageSrc(num) {
      return encodeURI(`${IMAGE_PREFIX}${num}${IMAGE_EXTENSION}`);
    }

    function preloadImage(num) {
      if (num < FIRST_IMAGE || num > LAST_IMAGE) return;

      const img = new Image();
      img.src = getImageSrc(num);
    }

    function updateUrl(num) {
      const url = new URL(window.location);
      url.searchParams.set("page", num);
      window.history.replaceState({}, "", url);
    }

    function showHome() {
      app.classList.add("hidden");
      home.classList.remove("hidden");
      closeProjects();
      history.replaceState({}, "", window.location.pathname);
    }

    function showApp(targetPage = START_IMAGE) {
      home.classList.add("hidden");
      app.classList.remove("hidden");
      goToPage(targetPage, false);
    }

    function goToPage(num, closeDrawer = true) {
      const target = parseInt(num, 10);

      if (!target || target < FIRST_IMAGE || target > LAST_IMAGE) {
        return;
      }

      currentImage = target;

      pageImage.classList.add("loading");

      const src = getImageSrc(currentImage);

      pageImage.onload = function() {
        pageImage.classList.remove("loading");
        preloadImage(currentImage + 1);
        preloadImage(currentImage - 1);
      };

      pageImage.src = src;

      updateUrl(currentImage);

      if (closeDrawer) closeProjects();
    }

    function previousPage() {
      if (app.classList.contains("hidden")) return;
      if (currentImage <= FIRST_IMAGE) return;

      goToPage(currentImage - 1, false);
    }

    function nextPage() {
      if (app.classList.contains("hidden")) return;
      if (currentImage >= LAST_IMAGE) return;

      goToPage(currentImage + 1, false);
    }

    function openProjects() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeProjects() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function buildProjectList() {
      PROJECTS.forEach(function(project, index) {
        const button = document.createElement("button");
        button.className = "project-item";

        button.innerHTML = `
          <span class="project-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
          <span class="project-subtitle">${project.subtitle}</span>
          <span class="project-page">Image ${project.page}</span>
        `;

        button.addEventListener("click", function() {
          showApp(project.page);
          closeProjects();
        });

        projectList.appendChild(button);
      });
    }

    home.addEventListener("click", function() {
      showApp(START_IMAGE);
    });

    document.getElementById("brand").addEventListener("click", showHome);

    document.getElementById("projects-btn").addEventListener("click", openProjects);
    document.getElementById("close-drawer").addEventListener("click", closeProjects);
    overlay.addEventListener("click", closeProjects);

    document.getElementById("prev-side").addEventListener("click", previousPage);
    document.getElementById("next-side").addEventListener("click", nextPage);

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeProjects();
      if (e.key === "ArrowLeft") previousPage();
      if (e.key === "ArrowRight") nextPage();
    });

    document.querySelector(".document-wrap").addEventListener("wheel", function(e) {
      if (app.classList.contains("hidden")) return;

      e.preventDefault();

      const now = Date.now();

      if (now - lastWheelTime < 420) return;
      if (Math.abs(e.deltaY) < 20) return;

      if (e.deltaY > 0) {
        nextPage();
      } else {
        previousPage();
      }

      lastWheelTime = now;
    }, { passive: false });

    buildProjectList();

    const params = new URLSearchParams(window.location.search);
    const directPage = parseInt(params.get("page"), 10);

    if (Number.isInteger(directPage) && directPage >= FIRST_IMAGE && directPage <= LAST_IMAGE) {
      showApp(directPage);
    }
  </script>
</body>
</html>
