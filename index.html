<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* ACCUEIL */

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .home-name {
      position: absolute;
      top: 34px;
      left: 40px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #ffffff;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .home-name:hover {
      opacity: 0.6;
    }

    /* STRUCTURE */

    #site {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      overflow: hidden;
    }

    .topbar {
      height: 44px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(17, 17, 17, 0.08);
      background: #ffffff;
    }

    #brand.brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 21px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      color: #111;
    }

    #brand.brand:hover {
      opacity: 0.6;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      white-space: nowrap;
    }

    .topbar button:not(.brand),
    .topbar a {
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #111;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar button:not(.brand):hover,
    .topbar a:hover {
      opacity: 0.6;
    }

    /* PAGE PROJETS */

    .summary {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 54px 36px 40px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .project-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .project-card {
      border: none;
      background: transparent;
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: #111;
      min-width: 0;
    }

    .project-card:hover .thumb {
      filter: brightness(0.84);
    }

    .project-card:hover .card-title,
    .project-card:hover .card-type,
    .project-card:hover .card-line {
      opacity: 0.62;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #f0f0f0;
      transition: filter 0.2s ease;
    }

    .card-text {
      padding-top: 12px;
      display: block;
    }

    .card-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
      transition: opacity 0.2s ease;
    }

    .card-type {
      display: block;
      font-size: 11px;
      line-height: 1.3;
      color: #555;
      margin-bottom: 5px;
      transition: opacity 0.2s ease;
    }

    .card-line {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      color: #222;
      transition: opacity 0.2s ease;
    }

    /* À PROPOS */

    .about {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
    }

    .about-wrap {
      position: relative;
      width: 100vw;
      height: calc(100vh - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #about-image {
      max-width: 100vw;
      max-height: calc(100vh - 44px);
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.12s ease;
      user-select: none;
      -webkit-user-drag: none;
      background: #ffffff;
      touch-action: pan-y;
    }

    #about-image.loading {
      opacity: 0.35;
    }

    /* VIEWER PROJETS */

    .viewer {
      width: 100vw;
      height: calc(100vh - 44px);
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #ffffff;
    }

    .document-wrap {
      position: relative;
      width: 100vw;
      height: calc(100vh - 44px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #page-image {
      max-width: 100vw;
      max-height: calc(100vh - 44px);
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.12s ease;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: pan-y;
    }

    #page-image.loading {
      opacity: 0.35;
    }

    .nav-side {
      position: fixed;
      top: calc(44px + (100vh - 44px) / 2);
      transform: translateY(-50%);
      width: 44px;
      height: 72px;
      padding: 0;
      border: none;
      background: transparent;
      color: #111;
      font-size: 34px;
      line-height: 1;
      opacity: 0.16;
      z-index: 10;
      cursor: pointer;
    }

    .nav-side:hover {
      opacity: 0.75;
    }

    .nav-side:disabled {
      opacity: 0.04;
      cursor: default;
    }

    .nav-prev {
      left: 8px;
    }

    .nav-next {
      right: 8px;
    }

    /* MENU PROJETS */

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      max-width: 92vw;
      height: 100vh;
      background: #ffffff;
      border-left: 1px solid rgba(17, 17, 17, 0.14);
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      padding: 28px;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .close-drawer {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      font-size: 22px;
      opacity: 0.55;
      cursor: pointer;
    }

    .close-drawer:hover {
      opacity: 1;
    }

    .project-item {
      width: 100%;
      padding: 16px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      text-align: left;
      background: transparent;
      color: #111;
      cursor: pointer;
    }

    .project-item:hover {
      opacity: 0.6;
    }

    .project-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .project-subtitle {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      color: #555;
    }

    .project-page {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #777;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 17, 17, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 15;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* TABLETTE */

    @media (max-width: 1100px) {
      .summary {
        align-items: flex-start;
        overflow-y: auto;
      }

      .project-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    /* MOBILE */

    @media (max-width: 700px) {
      .home-name {
        top: 24px;
        left: 22px;
        font-size: 25px;
      }

      .topbar {
        height: auto;
        min-height: 70px;
        padding: 12px 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      #brand.brand {
        font-size: 20px;
      }

      .topbar-right {
        justify-content: flex-start;
        gap: 18px;
        flex-wrap: wrap;
      }

      .summary {
        height: calc(100vh - 90px);
        padding: 24px 0 28px;
        align-items: center;
        justify-content: flex-start;
        overflow: hidden;
      }

      .project-grid {
        display: flex;
        width: 100vw;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 16px;
        padding: 0 18px 14px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .project-card {
        flex: 0 0 72vw;
        scroll-snap-align: center;
      }

      .project-grid::-webkit-scrollbar {
        display: none;
      }

      .about,
      .about-wrap,
      .viewer,
      .document-wrap {
        height: calc(100vh - 90px);
      }

      #about-image,
      #page-image {
        max-width: 100vw;
        max-height: calc(100vh - 90px);
      }

      .nav-side {
        top: calc(90px + (100vh - 90px) / 2);
        opacity: 0.20;
      }

      .nav-prev {
        left: 4px;
      }

      .nav-next {
        right: 4px;
      }
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">GUILLAUME MORVAN</button>
  </section>

  <section id="site" class="hidden">
    <header class="topbar">
      <button id="brand" class="brand">GUILLAUME MORVAN</button>

      <div class="topbar-right">
        <button id="projects-btn">Projets</button>
        <button id="about-btn">À propos</button>
      </div>
    </header>

    <main id="summary" class="summary">
      <div id="project-grid" class="project-grid"></div>
    </main>

    <main id="about" class="about hidden">
      <div class="about-wrap">
        <button id="about-prev" class="nav-side nav-prev" aria-label="Page À propos précédente">‹</button>
        <img id="about-image" src="" alt="À propos — Guillaume Morvan" />
        <button id="about-next" class="nav-side nav-next" aria-label="Page À propos suivante">›</button>
      </div>
    </main>

    <main id="viewer" class="viewer hidden">
      <div class="document-wrap">
        <button id="prev-side" class="nav-side nav-prev" aria-label="Page précédente">‹</button>
        <img id="page-image" src="" alt="Portfolio Guillaume Morvan" />
        <button id="next-side" class="nav-side nav-next" aria-label="Page suivante">›</button>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h2>Projets</h2>
      <button id="close-drawer" class="close-drawer" aria-label="Fermer">×</button>
    </div>

    <div id="project-list"></div>
  </aside>

  <script>
    const DESKTOP_BREAKPOINT = 700;

    const DESKTOP_IMAGE_FOLDER = "pages/";
    const MOBILE_IMAGE_FOLDER = "pages-mobile/";

    const VIGNETTE_FOLDER = "Vignettes/";

    const DESKTOP_ABOUT_FOLDER = "apropos/";
    const MOBILE_ABOUT_FOLDER = "apropos-mobile/";

    const DESKTOP_ABOUT_TOTAL = 2;
    const MOBILE_ABOUT_TOTAL = 4;

    const DESKTOP_PROJECTS = [
      {
        title: "Melle",
        fullTitle: "Station ferroviaire Melle",
        type: "Projet urbain et bâtiment mixte",
        line: "Évolutivité et appropriation des espaces.",
        thumb: "melle.jpg",
        start: 4,
        end: 8
      },
      {
        title: "Saint-Joseph",
        fullTitle: "Église Saint-Joseph",
        type: "Réhabilitation patrimoniale",
        line: "Révéler les qualités cachées du patrimoine.",
        thumb: "saint-joseph.jpg",
        start: 9,
        end: 17
      },
      {
        title: "Ferme Nord",
        fullTitle: "Ferme Nord",
        type: "Réhabilitation et extension",
        line: "L’harmonieux contraste.",
        thumb: "ferme-nord.jpg",
        start: 18,
        end: 33
      },
      {
        title: "TANK",
        fullTitle: "TANK Architectes",
        type: "Expérience en agence",
        line: "L’architecte dans une pratique engagée pour la qualité.",
        thumb: "tank.jpg",
        start: 34,
        end: 39
      },
      {
        title: "Edwood",
        fullTitle: "Edwood",
        type: "Construction bois",
        line: "Le chantier comme école de la réalité constructive.",
        thumb: "edwood.jpg",
        start: 40,
        end: 43
      }
    ];

    const MOBILE_PROJECTS = [
      {
        title: "Melle",
        fullTitle: "Station ferroviaire Melle",
        type: "Projet urbain et bâtiment mixte",
        line: "Évolutivité et appropriation des espaces.",
        thumb: "melle.jpg",
        start: 4,
        end: 8
      },
      {
        title: "Saint-Joseph",
        fullTitle: "Église Saint-Joseph",
        type: "Réhabilitation patrimoniale",
        line: "Révéler les qualités cachées du patrimoine.",
        thumb: "saint-joseph.jpg",
        start: 9,
        end: 17
      },
      {
        title: "Ferme Nord",
        fullTitle: "Ferme Nord",
        type: "Réhabilitation et extension",
        line: "L’harmonieux contraste.",
        thumb: "ferme-nord.jpg",
        start: 18,
        end: 33
      },
      {
        title: "TANK",
        fullTitle: "TANK Architectes",
        type: "Expérience en agence",
        line: "L’architecte dans une pratique engagée pour la qualité.",
        thumb: "tank.jpg",
        start: 34,
        end: 39
      },
      {
        title: "Edwood",
        fullTitle: "Edwood",
        type: "Construction bois",
        line: "Le chantier comme école de la réalité constructive.",
        thumb: "edwood.jpg",
        start: 40,
        end: 43
      }
    ];

    let currentImage = null;
    let currentProject = null;
    let currentAboutPage = 1;
    let lastWheelTime = 0;

    let touchStartX = 0;
    let touchStartY = 0;

    const home = document.getElementById("home");
    const site = document.getElementById("site");
    const summary = document.getElementById("summary");
    const about = document.getElementById("about");
    const viewer = document.getElementById("viewer");

    const pageImage = document.getElementById("page-image");
    const aboutImage = document.getElementById("about-image");

    const prevSide = document.getElementById("prev-side");
    const nextSide = document.getElementById("next-side");

    const aboutPrev = document.getElementById("about-prev");
    const aboutNext = document.getElementById("about-next");

    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectList = document.getElementById("project-list");
    const projectGrid = document.getElementById("project-grid");

    function isMobile() {
      return window.innerWidth <= DESKTOP_BREAKPOINT;
    }

    function getProjects() {
      return isMobile() ? MOBILE_PROJECTS : DESKTOP_PROJECTS;
    }

    function getImageFolder() {
      return isMobile() ? MOBILE_IMAGE_FOLDER : DESKTOP_IMAGE_FOLDER;
    }

    function getAboutFolder() {
      return isMobile() ? MOBILE_ABOUT_FOLDER : DESKTOP_ABOUT_FOLDER;
    }

    function getAboutTotal() {
      return isMobile() ? MOBILE_ABOUT_TOTAL : DESKTOP_ABOUT_TOTAL;
    }

    function getImageSrc(num) {
      return encodeURI(`${getImageFolder()}page (${num}).jpg`);
    }

    function getAboutSrc(num) {
      return encodeURI(`${getAboutFolder()}page (${num}).jpg`);
    }

    function getVignetteSrc(filename) {
      return encodeURI(`${VIGNETTE_FOLDER}${filename}`);
    }

    function preloadImage(num) {
      if (!currentProject) return;
      if (num < currentProject.start || num > currentProject.end) return;

      const img = new Image();
      img.src = getImageSrc(num);
    }

    function preloadAboutPage(num) {
      if (num < 1 || num > getAboutTotal()) return;

      const img = new Image();
      img.src = getAboutSrc(num);
    }

    function findProjectByPage(page) {
      return getProjects().find(function(project) {
        return page >= project.start && page <= project.end;
      }) || null;
    }

    function updateUrl(num) {
      const url = new URL(window.location);
      url.searchParams.set("page", num);
      window.history.replaceState({}, "", url);
    }

    function clearUrl() {
      history.replaceState({}, "", window.location.pathname);
    }

    function updateNavState() {
      if (!currentProject || currentImage === null) {
        prevSide.disabled = true;
        nextSide.disabled = true;
        return;
      }

      prevSide.disabled = currentImage <= currentProject.start;
      nextSide.disabled = currentImage >= currentProject.end;
    }

    function updateAboutNavState() {
      aboutPrev.disabled = currentAboutPage <= 1;
      aboutNext.disabled = currentAboutPage >= getAboutTotal();
    }

    function hideAllMainViews() {
      summary.classList.add("hidden");
      about.classList.add("hidden");
      viewer.classList.add("hidden");
    }

    function showSummary() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      summary.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeProjects();
      clearUrl();
    }

    function showAbout() {
      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      about.classList.remove("hidden");
      currentProject = null;
      currentImage = null;
      closeProjects();
      clearUrl();
      goToAboutPage(1);
    }

    function showViewer(project, targetPage) {
      currentProject = project;

      home.classList.add("hidden");
      site.classList.remove("hidden");
      hideAllMainViews();
      viewer.classList.remove("hidden");

      goToPage(targetPage || project.start, false);
    }

    function goToAboutPage(num) {
      if (num < 1 || num > getAboutTotal()) return;

      currentAboutPage = num;
      aboutImage.classList.add("loading");

      const src = getAboutSrc(currentAboutPage);

      aboutImage.onload = function() {
        aboutImage.classList.remove("loading");
        preloadAboutPage(currentAboutPage + 1);
        preloadAboutPage(currentAboutPage - 1);
      };

      aboutImage.onerror = function() {
        aboutImage.classList.remove("loading");
        aboutImage.alt = "Image introuvable : " + src;
      };

      aboutImage.src = src;
      aboutImage.alt = "À propos — Guillaume Morvan — page " + currentAboutPage;

      updateAboutNavState();
    }

    function previousAboutPage() {
      if (about.classList.contains("hidden")) return;
      if (currentAboutPage <= 1) return;

      goToAboutPage(currentAboutPage - 1);
    }

    function nextAboutPage() {
      if (about.classList.contains("hidden")) return;
      if (currentAboutPage >= getAboutTotal()) return;

      goToAboutPage(currentAboutPage + 1);
    }

    function goToPage(num, closeDrawer = true) {
      const target = parseInt(num, 10);

      if (!currentProject) return;
      if (!target || target < currentProject.start || target > currentProject.end) return;

      currentImage = target;
      pageImage.classList.add("loading");

      const src = getImageSrc(currentImage);

      pageImage.onload = function() {
        pageImage.classList.remove("loading");
        preloadImage(currentImage + 1);
        preloadImage(currentImage - 1);
      };

      pageImage.onerror = function() {
        pageImage.classList.remove("loading");
        pageImage.alt = "Image introuvable : " + src;
      };

      pageImage.src = src;
      updateUrl(currentImage);
      updateNavState();

      if (closeDrawer) closeProjects();
    }

    function previousPage() {
      if (viewer.classList.contains("hidden")) return;
      if (!currentProject) return;
      if (currentImage <= currentProject.start) return;

      goToPage(currentImage - 1, false);
    }

    function nextPage() {
      if (viewer.classList.contains("hidden")) return;
      if (!currentProject) return;
      if (currentImage >= currentProject.end) return;

      goToPage(currentImage + 1, false);
    }

    function openProjects() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeProjects() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function buildProjectCards() {
      projectGrid.innerHTML = "";

      getProjects().forEach(function(project, index) {
        const button = document.createElement("button");
        button.className = "project-card";

        button.innerHTML = `
          <img class="thumb" src="${getVignetteSrc(project.thumb)}" alt="${project.fullTitle}" />
          <span class="card-text">
            <span class="card-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
            <span class="card-type">${project.type}</span>
            <span class="card-line">${project.line}</span>
          </span>
        `;

        button.addEventListener("click", function() {
          showViewer(project, project.start);
        });

        projectGrid.appendChild(button);
      });
    }

    function buildProjectList() {
      projectList.innerHTML = "";

      getProjects().forEach(function(project, index) {
        const button = document.createElement("button");
        button.className = "project-item";

        button.innerHTML = `
          <span class="project-title">${String(index + 1).padStart(2, "0")} — ${project.fullTitle}</span>
          <span class="project-subtitle">${project.line}</span>
          <span class="project-page">Pages ${project.start} à ${project.end}</span>
        `;

        button.addEventListener("click", function() {
          showViewer(project, project.start);
          closeProjects();
        });

        projectList.appendChild(button);
      });
    }

    function rebuildResponsiveContent() {
      buildProjectCards();
      buildProjectList();

      if (!about.classList.contains("hidden")) {
        if (currentAboutPage > getAboutTotal()) {
          currentAboutPage = getAboutTotal();
        }
        goToAboutPage(currentAboutPage);
      }

      if (!viewer.classList.contains("hidden") && currentImage !== null) {
        const project = findProjectByPage(currentImage);

        if (project) {
          currentProject = project;
          goToPage(currentImage, false);
        } else {
          showSummary();
        }
      }
    }

    function handleWheel(e, previousFunction, nextFunction) {
      e.preventDefault();

      const now = Date.now();

      if (now - lastWheelTime < 420) return;
      if (Math.abs(e.deltaY) < 20) return;

      if (e.deltaY > 0) {
        nextFunction();
      } else {
        previousFunction();
      }

      lastWheelTime = now;
    }

    function handleTouchStart(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }

    function handleTouchEnd(e, previousFunction, nextFunction) {
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;

      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;

      if (Math.abs(deltaX) < 45) return;
      if (Math.abs(deltaX) < Math.abs(deltaY)) return;

      if (deltaX < 0) {
        nextFunction();
      } else {
        previousFunction();
      }
    }

    home.addEventListener("click", showSummary);
    document.getElementById("home-name").addEventListener("click", showSummary);

    document.getElementById("brand").addEventListener("click", showSummary);
    document.getElementById("about-btn").addEventListener("click", showAbout);

    document.getElementById("projects-btn").addEventListener("click", function() {
      if (site.classList.contains("hidden")) {
        showSummary();
      } else if (!viewer.classList.contains("hidden")) {
        openProjects();
      } else {
        showSummary();
      }
    });

    document.getElementById("close-drawer").addEventListener("click", closeProjects);
    overlay.addEventListener("click", closeProjects);

    prevSide.addEventListener("click", previousPage);
    nextSide.addEventListener("click", nextPage);

    aboutPrev.addEventListener("click", previousAboutPage);
    aboutNext.addEventListener("click", nextAboutPage);

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeProjects();

      if (e.key === "ArrowLeft") {
        if (!viewer.classList.contains("hidden")) previousPage();
        if (!about.classList.contains("hidden")) previousAboutPage();
      }

      if (e.key === "ArrowRight") {
        if (!viewer.classList.contains("hidden")) nextPage();
        if (!about.classList.contains("hidden")) nextAboutPage();
      }
    });

    pageImage.addEventListener("wheel", function(e) {
      if (viewer.classList.contains("hidden")) return;
      handleWheel(e, previousPage, nextPage);
    }, { passive: false });

    aboutImage.addEventListener("wheel", function(e) {
      if (about.classList.contains("hidden")) return;
      handleWheel(e, previousAboutPage, nextAboutPage);
    }, { passive: false });

    pageImage.addEventListener("touchstart", handleTouchStart, { passive: true });

    pageImage.addEventListener("touchend", function(e) {
      handleTouchEnd(e, previousPage, nextPage);
    }, { passive: true });

    aboutImage.addEventListener("touchstart", handleTouchStart, { passive: true });

    aboutImage.addEventListener("touchend", function(e) {
      handleTouchEnd(e, previousAboutPage, nextAboutPage);
    }, { passive: true });

    window.addEventListener("resize", function() {
      clearTimeout(window.responsiveTimer);
      window.responsiveTimer = setTimeout(rebuildResponsiveContent, 250);
    });

    buildProjectCards();
    buildProjectList();
    updateAboutNavState();

    const params = new URLSearchParams(window.location.search);
    const directPage = parseInt(params.get("page"), 10);
    const directProject = findProjectByPage(directPage);

    if (directProject) {
      showViewer(directProject, directPage);
    }
  </script>
</body>
</html>
