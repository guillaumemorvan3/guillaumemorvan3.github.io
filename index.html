<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillaume Morvan — Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f3ee;
      color: #111;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* ACCUEIL PLEINE IMAGE */

    .home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }

    .home-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .home-name {
      position: absolute;
      top: 34px;
      left: 40px;
      z-index: 2;
      border: none;
      background: transparent;
      padding: 0;
      color: #f5f3ee;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: -0.03em;
      cursor: pointer;
    }

    .home-name:hover {
      opacity: 0.55;
      background: transparent;
      color: #f5f3ee;
    }

    /* VIEWER */

    #app {
      width: 100vw;
      height: 100vh;
      background: #f5f3ee;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      padding: 0 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(17, 17, 17, 0.12);
      background: #f5f3ee;
    }

    .brand {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 19px;
      font-weight: 400;
      letter-spacing: -0.03em;
      cursor: pointer;
      white-space: nowrap;
    }

    .brand:hover {
      background: transparent;
      color: #111;
      opacity: 0.55;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex: 1;
      white-space: nowrap;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      white-space: nowrap;
    }

    a,
    button {
      font: inherit;
      font-size: 12px;
      border: 1px solid rgba(17, 17, 17, 0.55);
      background: transparent;
      color: #111;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    a,
    .topbar button {
      padding: 7px 10px;
    }

    a:hover,
    button:hover {
      background: #111;
      color: #f5f3ee;
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #444;
    }

    .page-nav input {
      width: 42px;
      height: 27px;
      border: 1px solid rgba(17, 17, 17, 0.35);
      background: transparent;
      text-align: center;
      font: inherit;
      color: #111;
    }

    .viewer {
      width: 100vw;
      height: calc(100vh - 52px);
      padding: 14px 54px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .document-wrap {
      position: relative;
      width: fit-content;
      max-width: 100%;
      max-height: 100%;
    }

    #pdf-canvas {
      display: block;
      background: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.13);
    }

    .nav-side {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 62px;
      padding: 0;
      border: none;
      background: rgba(245, 243, 238, 0.72);
      color: #111;
      font-size: 30px;
      line-height: 1;
      opacity: 0.22;
      z-index: 5;
    }

    .nav-side:hover {
      opacity: 0.9;
      background: rgba(245, 243, 238, 0.96);
      color: #111;
    }

    #prev-side {
      left: -46px;
    }

    #next-side {
      right: -46px;
    }

    /* MENU PROJETS */

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      max-width: 92vw;
      height: 100vh;
      background: #f5f3ee;
      border-left: 1px solid rgba(17, 17, 17, 0.18);
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.08);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      padding: 28px;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .close-drawer {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      font-size: 22px;
      opacity: 0.55;
    }

    .close-drawer:hover {
      opacity: 1;
      background: transparent;
      color: #111;
    }

    .project-item {
      width: 100%;
      padding: 16px 0;
      border: none;
      border-bottom: 1px solid rgba(17, 17, 17, 0.16);
      text-align: left;
      background: transparent;
      color: #111;
    }

    .project-item:hover {
      background: transparent;
      color: #111;
      opacity: 0.55;
    }

    .project-title {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .project-subtitle {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      color: #555;
    }

    .project-page {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #777;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 17, 17, 0.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 15;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 850px) {
      .home-name {
        top: 24px;
        left: 22px;
        font-size: 24px;
      }

      .topbar {
        height: auto;
        min-height: 96px;
        padding: 12px 14px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .topbar-center,
      .topbar-right {
        justify-content: flex-start;
      }

      .viewer {
        height: calc(100vh - 120px);
        padding: 12px;
      }

      #pdf-canvas {
        box-shadow: none;
      }

      #prev-side {
        left: 6px;
      }

      #next-side {
        right: 6px;
      }

      .nav-side {
        background: rgba(245, 243, 238, 0.86);
        opacity: 0.45;
      }
    }
  </style>
</head>

<body>
  <section id="home" class="home">
    <img src="cover.jpg" alt="Guillaume Morvan — Portfolio" class="home-image" />
    <button id="home-name" class="home-name">Guillaume Morvan</button>
  </section>

  <section id="app" class="hidden">
    <header class="topbar">
      <button id="brand" class="brand">Guillaume Morvan</button>

      <div class="topbar-center">
        <button id="projects-btn">Projets</button>

        <div class="page-nav">
          <button id="prev-small" aria-label="Page précédente">‹</button>
          <span>Page</span>
          <input id="page-input" type="number" min="1" value="1" />
          <span>/</span>
          <span id="page-count">—</span>
          <button id="next-small" aria-label="Page suivante">›</button>
        </div>
      </div>

      <div class="topbar-right">
        <a href="portfolio-guillaume-morvan.pdf" download>Télécharger le PDF</a>
        <a href="portfolio-guillaume-morvan.pdf" target="_blank">Ouvrir le PDF</a>
      </div>
    </header>

    <main class="viewer">
      <div class="document-wrap">
        <button id="prev-side" class="nav-side" aria-label="Page précédente">‹</button>
        <canvas id="pdf-canvas"></canvas>
        <button id="next-side" class="nav-side" aria-label="Page suivante">›</button>
      </div>
    </main>
  </section>

  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h2>Projets</h2>
      <button id="close-drawer" class="close-drawer" aria-label="Fermer">×</button>
    </div>

    <div id="project-list"></div>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const PDF_URL = "portfolio-guillaume-morvan.pdf";
    const START_PAGE = 1;

    const PROJECTS = [
      {
        title: "Fondations",
        subtitle: "Entre technologies contemporaines et bon sens vernaculaire",
        page: 4
      },
      {
        title: "Station ferroviaire Melle",
        subtitle: "Évolutivité et appropriation des espaces",
        page: 6
      },
      {
        title: "Église Saint-Joseph",
        subtitle: "Réhabilitation du patrimoine : révéler les qualités cachées",
        page: 20
      },
      {
        title: "Ferme Nord",
        subtitle: "Réhabilitation du patrimoine : l’harmonieux contraste",
        page: 40
      },
      {
        title: "TANK",
        subtitle: "L’architecte dans une pratique engagée pour la qualité",
        page: 78
      },
      {
        title: "EDWOOD",
        subtitle: "Le chantier bois : école de la réalité constructive",
        page: 90
      }
    ];

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    let pdfDoc = null;
    let pageNum = START_PAGE;
    let pageRendering = false;
    let pageNumPending = null;
    let lastWheelTime = 0;

    const home = document.getElementById("home");
    const app = document.getElementById("app");

    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");

    const pageInput = document.getElementById("page-input");
    const pageCountEl = document.getElementById("page-count");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");
    const projectList = document.getElementById("project-list");

    function showHome() {
      app.classList.add("hidden");
      home.classList.remove("hidden");
      closeProjects();
      history.replaceState({}, "", window.location.pathname);
    }

    function showApp(targetPage = START_PAGE) {
      home.classList.add("hidden");
      app.classList.remove("hidden");
      goToPage(targetPage, false);
    }

    function updateUrl(num) {
      const url = new URL(window.location);
      url.searchParams.set("page", num);
      window.history.replaceState({}, "", url);
    }

    function renderPage(num) {
      pageRendering = true;

      pdfDoc.getPage(num).then(function(page) {
        const viewer = document.querySelector(".viewer");
        const maxWidth = viewer.clientWidth - 8;
        const maxHeight = viewer.clientHeight - 8;

        const baseViewport = page.getViewport({ scale: 1 });

        const scale = Math.min(
          maxWidth / baseViewport.width,
          maxHeight / baseViewport.height
        );

        const viewport = page.getViewport({ scale: scale });
        const outputScale = window.devicePixelRatio || 1;

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        const transform = outputScale !== 1
          ? [outputScale, 0, 0, outputScale, 0, 0]
          : null;

        const renderTask = page.render({
          canvasContext: ctx,
          transform: transform,
          viewport: viewport
        });

        renderTask.promise.then(function() {
          pageRendering = false;

          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      pageInput.value = num;
      updateUrl(num);
    }

    function queueRenderPage(num) {
      if (!pdfDoc) return;

      const safePage = Math.max(1, Math.min(num, pdfDoc.numPages));

      if (pageRendering) {
        pageNumPending = safePage;
      } else {
        renderPage(safePage);
      }
    }

    function goToPage(num, closeDrawer = true) {
      if (!pdfDoc) return;

      const target = parseInt(num, 10);

      if (!target || target < 1 || target > pdfDoc.numPages) {
        pageInput.value = pageNum;
        return;
      }

      pageNum = target;
      queueRenderPage(pageNum);

      if (closeDrawer) closeProjects();
    }

    function previousPage() {
      if (!pdfDoc || pageNum <= 1 || app.classList.contains("hidden")) return;
      pageNum--;
      queueRenderPage(pageNum);
    }

    function nextPage() {
      if (!pdfDoc || pageNum >= pdfDoc.numPages || app.classList.contains("hidden")) return;
      pageNum++;
      queueRenderPage(pageNum);
    }

    function openProjects() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeProjects() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function buildProjectList() {
      PROJECTS.forEach(function(project, index) {
        const button = document.createElement("button");
        button.className = "project-item";
        button.innerHTML = `
          <span class="project-title">${String(index + 1).padStart(2, "0")} — ${project.title}</span>
          <span class="project-subtitle">${project.subtitle}</span>
          <span class="project-page">Page ${project.page}</span>
        `;

        button.addEventListener("click", function() {
          showApp(project.page);
          closeProjects();
        });

        projectList.appendChild(button);
      });
    }

    home.addEventListener("click", function() {
      showApp(START_PAGE);
    });

    document.getElementById("brand").addEventListener("click", showHome);

    document.getElementById("projects-btn").addEventListener("click", openProjects);
    document.getElementById("close-drawer").addEventListener("click", closeProjects);
    overlay.addEventListener("click", closeProjects);

    document.getElementById("prev-small").addEventListener("click", previousPage);
    document.getElementById("next-small").addEventListener("click", nextPage);
    document.getElementById("prev-side").addEventListener("click", previousPage);
    document.getElementById("next-side").addEventListener("click", nextPage);

    pageInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        goToPage(pageInput.value);
      }
    });

    pageInput.addEventListener("blur", function() {
      pageInput.value = pageNum;
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeProjects();
      if (e.key === "ArrowLeft") previousPage();
      if (e.key === "ArrowRight") nextPage();
    });

    document.querySelector(".document-wrap").addEventListener("wheel", function(e) {
      if (!pdfDoc || app.classList.contains("hidden")) return;

      e.preventDefault();

      const now = Date.now();

      if (now - lastWheelTime < 650) return;
      if (Math.abs(e.deltaY) < 20) return;

      if (e.deltaY > 0) {
        nextPage();
      } else {
        previousPage();
      }

      lastWheelTime = now;
    }, { passive: false });

    window.addEventListener("resize", function() {
      if (!app.classList.contains("hidden")) {
        queueRenderPage(pageNum);
      }
    });

    buildProjectList();

    pdfjsLib.getDocument(PDF_URL).promise.then(function(pdf) {
      pdfDoc = pdf;
      pageCountEl.textContent = pdf.numPages;

      const params = new URLSearchParams(window.location.search);
      const directPage = parseInt(params.get("page"), 10);

      if (Number.isInteger(directPage) && directPage > 0) {
        showApp(Math.min(directPage, pdf.numPages));
      }
    });
  </script>
</body>
</html>
